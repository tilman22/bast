name: Wetter Import

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Python Setup
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"

      - name: Dependencies installieren
        run: pip install -r requirements.txt

      - name: Wetterdaten importieren
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python3 wetter_import.py
